<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Mandrake Betting</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#07091a;font-family:'Segoe UI',system-ui,sans-serif;color:#e8edf8;overscroll-behavior:none}
  input::placeholder{color:#2e3f5e}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.6)}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#1e2f50;border-radius:99px}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes progress{0%{width:5%}70%{width:85%}100%{width:92%}}
  .spin{animation:spin 1.5s linear infinite;display:inline-block}
  .progress-bar{animation:progress 3.5s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const C = {
  bg:'#07091a',card:'#0d1528',card2:'#121e38',border:'#1e2f50',
  gold:'#f5c518',green:'#00e676',red:'#ff4757',blue:'#4facfe',
  text:'#e8edf8',muted:'#8899b8',dim:'#c0cce4',
  hot:'#ff4757',good:'#f5c518',solid:'#00e676',
};

const fmt = n => parseFloat(n||0).toFixed(2);
const todayStr = () => new Date().toISOString().split('T')[0];

// localStorage helpers
const lsGet = (k,def) => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch{return def} };
const lsSet = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v))}catch{} };

function App() {
  const [tab,setTab] = useState('analysis');
  const [date,setDate] = useState(todayStr());
  const [loading,setLoading] = useState(false);
  const [suggestions,setSuggestions] = useState(null);
  const [slip,setSlip] = useState([]);
  const [showSlip,setShowSlip] = useState(false);
  const [slipStake,setSlipStake] = useState('');
  const [bets,setBets] = useState(() => lsGet('mb:bets',[]));
  const [newBet,setNewBet] = useState({match:'',market:'',selection:'',odds:'',stake:''});
  const [expandedId,setExpandedId] = useState(null);
  const [loadMsg,setLoadMsg] = useState('');
  const [apiKey,setApiKey] = useState(() => lsGet('mb:apikey',''));
  const [showSettings,setShowSettings] = useState(false);
  const [tempKey,setTempKey] = useState('');

  const loadMsgs = [
    '🔍 Ricerca partite in corso...','📊 Analisi statistiche avanzata...',
    '🏥 Controllo infortuni e squalifiche...','⚽ Valutazione forma recente...',
    '🧮 Calcolo probabilità e valore...','🎯 Selezione migliori opportunità...',
  ];

  const saveBets = b => { lsSet('mb:bets',b); setBets(b); };

  const analyze = async () => {
    if(!apiKey){setShowSettings(true);return;}
    setLoading(true); setSuggestions(null);
    let i=0; setLoadMsg(loadMsgs[0]);
    const iv = setInterval(()=>{i=Math.min(i+1,loadMsgs.length-1);setLoadMsg(loadMsgs[i]);},3500);

    const todayFull = new Date().toLocaleDateString('it-IT',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const prompt = `Sei un analista esperto di scommesse calcistiche con 20+ anni di esperienza professionale.

DATA RICHIESTA: ${date}
OGGI È: ${todayFull}

ISTRUZIONI CRITICHE:
- Devi trovare SOLO partite programmate per la data ${date}
- Se la data è futura, cerca il calendario ufficiale delle partite
- Se la data è odierna, cerca le partite di oggi ${date}
- NON confondere con partite di altri giorni
- Cerca specificamente: "partite calcio ${date}", "football matches ${date}", "soccer fixtures ${date}"

FASE 1 - RICERCA: Usa la ricerca web per trovare TUTTE le partite di calcio del ${date} in: Serie A, Premier League, La Liga, Bundesliga, Ligue 1, Eredivisie, Primeira Liga, Super Lig, Champions League, Europa League, Conference League, Coppa Italia, FA Cup, Copa del Rey e tutti i tornei internazionali.

FASE 2 - ANALISI per ogni partita:
- Forma recente (ultimi 5 match)
- Head-to-head storici
- Infortuni, squalifiche, dubbi
- Motivazioni stagionali
- Statistiche casa/trasferta
- Quote medie bookmakers
- Arbitro designato
- Notizie recenti

FASE 3 - SELEZIONE: Scegli 5-8 migliori scommesse per valore atteso. Mercati: 1X2, Doppia Chance, Over/Under, Goal/No Goal, Asian Handicap, primo tempo, Entrambe Segnano.

FASE 4 - RISPOSTA: Rispondi SOLO con JSON valido (zero markdown, zero backtick, zero testo aggiuntivo):
{"date":"${date}","hasMatches":true,"noMatchMessage":"","suggestions":[{"id":1,"league":"Serie A","homeTeam":"Juventus","awayTeam":"Milan","time":"20:45","market":"Over 2.5 Gol","selection":"Over 2.5","odds":1.75,"confidence":8,"rating":"HOT","keyStats":["stat1","stat2","stat3"],"analysis":"Analisi dettagliata...","risk":"BASSA"}]}

Se non ci sono partite usa hasMatches:false. rating: HOT(8-10), GOOD(6-7), SOLID(4-5). risk: BASSA, MEDIA, ALTA`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt}]})
      });
      const data = await res.json();
      if(data.error){throw new Error(data.error.message);}
      const text = data.content.map(b=>b.type==='text'?b.text:'').join('');
      const clean = text.replace(/```json|```/g,'').trim();
      const s=clean.indexOf('{'),e=clean.lastIndexOf('}');
      setSuggestions(JSON.parse(clean.slice(s,e+1)));
    } catch(e) {
      setSuggestions({hasMatches:false,noMatchMessage:`Errore: ${e.message}. Verifica la tua API key nelle impostazioni.`,suggestions:[]});
    }
    clearInterval(iv); setLoading(false);
  };

  const inSlip = id => slip.some(s=>s.id===id);
  const toggleSlip = s => { if(inSlip(s.id)) setSlip(slip.filter(x=>x.id!==s.id)); else setSlip([...slip,{...s,customOdds:String(s.odds)}]); };
  const updateOdds = (id,val) => setSlip(slip.map(s=>s.id===id?{...s,customOdds:val}:s));
  const combinedOdds = slip.reduce((acc,s)=>acc*parseFloat(s.customOdds||1),1);
  const potentialWin = slipStake ? fmt(combinedOdds*parseFloat(slipStake)) : '—';

  const playSlip = () => {
    if(!slip.length||!slipStake) return;
    const bet = {
      id:Date.now(), date:new Date().toLocaleDateString('it-IT'),
      match:slip.length===1?`${slip[0].homeTeam} vs ${slip[0].awayTeam}`:`Multipla ${slip.length} eventi`,
      market:slip.length===1?slip[0].market:'Multipla',
      selection:slip.map(s=>`${s.homeTeam} vs ${s.awayTeam} [${s.selection} @${s.customOdds}]`).join(' | '),
      odds:fmt(combinedOdds),stake:slipStake,
      potentialWin:fmt(combinedOdds*parseFloat(slipStake)),
      result:'pending',isMulti:slip.length>1
    };
    saveBets([bet,...bets]);
    setSlip([]); setSlipStake(''); setShowSlip(false); setTab('bets');
  };

  const addBet = () => {
    if(!newBet.match||!newBet.odds||!newBet.stake) return;
    const bet={...newBet,id:Date.now(),date:new Date().toLocaleDateString('it-IT'),result:'pending',potentialWin:fmt(parseFloat(newBet.odds)*parseFloat(newBet.stake))};
    saveBets([bet,...bets]);
    setNewBet({match:'',market:'',selection:'',odds:'',stake:''});
  };
  const setResult=(id,result)=>saveBets(bets.map(b=>b.id===id?{...b,result}:b));
  const delBet=id=>saveBets(bets.filter(b=>b.id!==id));

  const won=bets.filter(b=>b.result==='won');
  const lost=bets.filter(b=>b.result==='lost');
  const totalStaked=bets.reduce((s,b)=>s+parseFloat(b.stake||0),0);
  const totalReturn=won.reduce((s,b)=>s+parseFloat(b.potentialWin||0),0);
  const netProfit=totalReturn-won.reduce((s,b)=>s+parseFloat(b.stake||0),0)-lost.reduce((s,b)=>s+parseFloat(b.stake||0),0);
  const winRate=(won.length+lost.length)>0?((won.length/(won.length+lost.length))*100).toFixed(0):0;
  const roi=totalStaked>0?(((totalReturn-totalStaked)/totalStaked)*100).toFixed(1):0;

  const rBg=r=>r==='HOT'?'rgba(255,71,87,0.15)':r==='GOOD'?'rgba(245,197,24,0.15)':'rgba(0,230,118,0.12)';
  const rCol=r=>r==='HOT'?C.hot:r==='GOOD'?C.good:C.solid;
  const confCol=c=>c>=8?C.green:c>=6?C.gold:'#ff8c00';

  const inp = (val,set,ph,type='text') => (
    <input type={type} value={val} onChange={e=>set(e.target.value)} placeholder={ph}
      style={{width:'100%',background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 12px',color:C.text,fontSize:13,marginBottom:8,outline:'none'}}/>
  );

  return (
    <div style={{minHeight:'100vh',background:`linear-gradient(160deg,#07091a 0%,#0a0f22 60%,#070918 100%)`,maxWidth:480,margin:'0 auto',position:'relative'}}>

      {/* HEADER */}
      <div style={{background:`linear-gradient(135deg,#0d1528,#162040,#0d1528)`,padding:'16px 16px 12px',borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:38,height:38,background:`linear-gradient(135deg,${C.gold},#c9a100)`,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,boxShadow:`0 0 20px rgba(245,197,24,0.4)`}}>🎩</div>
            <div>
              <div style={{fontSize:18,fontWeight:900,background:`linear-gradient(90deg,${C.gold},#ff8c00,${C.gold})`,WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',letterSpacing:'2px',lineHeight:1.1}}>MANDRAKE BETTING</div>
              <div style={{fontSize:10,color:C.muted,letterSpacing:'3px'}}>AI BETTING ADVISOR</div>
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {slip.length>0&&(
              <button onClick={()=>setShowSlip(true)} style={{position:'relative',background:`linear-gradient(135deg,${C.gold},#c9a100)`,border:'none',borderRadius:10,padding:'8px 12px',color:'#07091a',fontWeight:900,fontSize:12,cursor:'pointer'}}>
                🎫 Schedina
                <span style={{position:'absolute',top:-6,right:-6,background:C.red,color:'#fff',borderRadius:'50%',width:18,height:18,fontSize:11,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}}>{slip.length}</span>
              </button>
            )}
            <button onClick={()=>{setTempKey(apiKey);setShowSettings(true);}} style={{background:'rgba(255,255,255,0.06)',border:`1px solid ${C.border}`,borderRadius:8,padding:'7px 10px',color:C.muted,cursor:'pointer',fontSize:15}}>⚙️</button>
          </div>
        </div>
      </div>

      {/* TABS */}
      <div style={{display:'flex',background:C.card,borderBottom:`1px solid ${C.border}`,position:'sticky',top:72,zIndex:99}}>
        {[['analysis','🔮','Analisi'],['bets','📋','Giocate'],['stats','📊','Statistiche']].map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'10px 4px',background:'none',border:'none',color:tab===id?C.gold:C.muted,fontWeight:tab===id?700:400,fontSize:12,cursor:'pointer',borderBottom:tab===id?`2px solid ${C.gold}`:'2px solid transparent',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
            <span style={{fontSize:16}}>{icon}</span>{label}
          </button>
        ))}
      </div>

      {/* SETTINGS MODAL */}
      {showSettings&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>e.target===e.currentTarget&&setShowSettings(false)}>
          <div style={{background:`#0d1528`,borderRadius:20,padding:24,width:'100%',maxWidth:440,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:16,fontWeight:900,color:C.gold,marginBottom:6}}>⚙️ Impostazioni</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:16,lineHeight:1.5}}>Inserisci la tua API Key di Anthropic.<br/>Ottienila su <span style={{color:C.blue}}>console.anthropic.com</span></div>
            <input type="password" value={tempKey} onChange={e=>setTempKey(e.target.value)} placeholder="sk-ant-api03-..."
              style={{width:'100%',background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:'11px 12px',color:C.text,fontSize:13,outline:'none',marginBottom:14}}/>
            <div style={{fontSize:11,color:'rgba(255,71,87,0.8)',marginBottom:14,lineHeight:1.5}}>⚠️ La chiave viene salvata solo sul tuo dispositivo.</div>
            <button onClick={()=>{lsSet('mb:apikey',tempKey);setApiKey(tempKey);setShowSettings(false);}} style={{width:'100%',padding:'12px',background:`linear-gradient(135deg,${C.gold},#e6a800)`,border:'none',borderRadius:10,color:'#07091a',fontWeight:900,fontSize:14,cursor:'pointer'}}>SALVA</button>
          </div>
        </div>
      )}

      {/* SLIP MODAL */}
      {showSlip&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:999,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>e.target===e.currentTarget&&setShowSlip(false)}>
          <div style={{background:`linear-gradient(180deg,#0d1528,#0a1020)`,borderRadius:'20px 20px 0 0',padding:20,width:'100%',maxWidth:480,maxHeight:'85vh',overflowY:'auto',border:`1px solid ${C.border}`,borderBottom:'none'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontSize:16,fontWeight:900,color:C.gold}}>🎫 La Tua Schedina</div>
              <button onClick={()=>setShowSlip(false)} style={{background:'rgba(255,255,255,0.08)',border:'none',borderRadius:7,padding:'4px 10px',color:C.muted,cursor:'pointer'}}>✕</button>
            </div>
            {slip.map(s=>(
              <div key={s.id} style={{background:'rgba(255,255,255,0.04)',borderRadius:12,padding:12,marginBottom:10,border:`1px solid ${C.border}`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <div>
                    <div style={{fontSize:11,color:C.muted,marginBottom:2}}>{s.league} · {s.market}</div>
                    <div style={{fontWeight:700,fontSize:13}}>{s.homeTeam} vs {s.awayTeam}</div>
                    <div style={{fontSize:12,color:C.green,fontWeight:600,marginTop:2}}>{s.selection}</div>
                  </div>
                  <button onClick={()=>toggleSlip(s)} style={{background:'rgba(255,71,87,0.15)',border:'none',borderRadius:6,padding:'4px 8px',color:C.red,cursor:'pointer',fontSize:11,alignSelf:'flex-start'}}>✕</button>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:12,color:C.muted}}>Quota:</span>
                  <input value={s.customOdds} onChange={e=>updateOdds(s.id,e.target.value)}
                    style={{width:70,background:'rgba(245,197,24,0.08)',border:`1px solid rgba(245,197,24,0.3)`,borderRadius:7,padding:'5px 8px',color:C.gold,fontWeight:800,fontSize:14,outline:'none',textAlign:'center'}}/>
                </div>
              </div>
            ))}
            <div style={{background:'rgba(245,197,24,0.06)',borderRadius:12,padding:14,border:`1px solid rgba(245,197,24,0.2)`,marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                <span style={{color:C.muted,fontSize:13}}>Quota totale</span>
                <span style={{color:C.gold,fontWeight:900,fontSize:16}}>{fmt(combinedOdds)}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <span style={{color:C.muted,fontSize:13,flexShrink:0}}>Puntata €</span>
                <input value={slipStake} onChange={e=>setSlipStake(e.target.value)} placeholder="Es. 10" type="number"
                  style={{flex:1,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 12px',color:C.text,fontSize:14,outline:'none'}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:C.muted,fontSize:13}}>Vincita potenziale</span>
                <span style={{color:C.green,fontWeight:900,fontSize:16}}>€{potentialWin}</span>
              </div>
            </div>
            <button onClick={playSlip} disabled={!slipStake} style={{width:'100%',padding:'14px',background:slipStake?`linear-gradient(135deg,${C.green},#00a860)`:'#1a2540',border:'none',borderRadius:12,color:slipStake?'#07091a':C.muted,fontWeight:900,fontSize:15,cursor:slipStake?'pointer':'not-allowed',letterSpacing:'1px'}}>
              ✅ REGISTRA GIOCATA
            </button>
          </div>
        </div>
      )}

      <div style={{padding:14,paddingBottom:30}}>

        {/* ANALISI */}
        {tab==='analysis'&&(
          <div>
            {!apiKey&&(
              <div style={{background:'rgba(255,71,87,0.1)',borderRadius:14,padding:14,border:'1px solid rgba(255,71,87,0.3)',marginBottom:14,textAlign:'center'}}>
                <div style={{fontSize:13,color:C.red,fontWeight:700,marginBottom:6}}>⚠️ API Key non configurata</div>
                <div style={{fontSize:12,color:C.dim,marginBottom:10}}>Inserisci la tua API Key Anthropic per usare l'analisi AI</div>
                <button onClick={()=>{setTempKey('');setShowSettings(true);}} style={{background:`linear-gradient(135deg,${C.gold},#e6a800)`,border:'none',borderRadius:8,padding:'8px 16px',color:'#07091a',fontWeight:900,fontSize:13,cursor:'pointer'}}>⚙️ Vai alle Impostazioni</button>
              </div>
            )}
            <div style={{background:`linear-gradient(135deg,${C.card},${C.card2})`,borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
              <div style={{fontSize:11,color:C.muted,letterSpacing:'2px',textTransform:'uppercase',marginBottom:8}}>📅 Seleziona Data</div>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)}
                style={{width:'100%',background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:'11px',color:C.text,fontSize:15,fontWeight:600,outline:'none'}}/>
              <button onClick={analyze} disabled={loading} style={{marginTop:12,width:'100%',padding:'13px',background:loading?'#1a2540':`linear-gradient(135deg,${C.gold},#e6a800)`,border:'none',borderRadius:12,color:loading?C.muted:'#07091a',fontWeight:900,fontSize:15,cursor:loading?'not-allowed':'pointer',letterSpacing:'1px',boxShadow:loading?'none':`0 0 25px rgba(245,197,24,0.35)`}}>
                {loading?'⏳ Analisi in corso...':'🔮 ANALIZZA PARTITE'}
              </button>
            </div>

            {loading&&(
              <div style={{background:C.card,borderRadius:16,padding:24,border:`1px solid ${C.border}`,textAlign:'center',marginBottom:14}}>
                <div className="spin" style={{fontSize:36,marginBottom:12}}>⚽</div>
                <div style={{color:C.gold,fontWeight:700,fontSize:14,marginBottom:6}}>{loadMsg}</div>
                <div style={{color:C.dim,fontSize:13}}>Analisi statistica avanzata in corso...</div>
                <div style={{marginTop:14,height:5,background:C.border,borderRadius:99,overflow:'hidden'}}>
                  <div className="progress-bar" style={{height:'100%',background:`linear-gradient(90deg,${C.gold},#ff8c00)`,borderRadius:99}}/>
                </div>
              </div>
            )}

            {suggestions&&!suggestions.hasMatches&&(
              <div style={{background:C.card,borderRadius:16,padding:24,border:'1px solid rgba(255,71,87,0.3)',textAlign:'center'}}>
                <div style={{fontSize:40,marginBottom:10}}>🚫</div>
                <div style={{color:C.red,fontWeight:700,fontSize:16,marginBottom:8}}>Nessuna partita trovata</div>
                <div style={{color:C.dim,fontSize:14,lineHeight:1.6}}>{suggestions.noMatchMessage}</div>
                <div style={{marginTop:12,color:C.gold,fontSize:13}}>👆 Prova un'altra data</div>
              </div>
            )}

            {suggestions?.hasMatches&&suggestions.suggestions?.map(s=>(
              <div key={s.id} style={{background:`linear-gradient(135deg,${C.card},${C.card2})`,borderRadius:16,border:`1px solid ${inSlip(s.id)?'rgba(0,230,118,0.5)':C.border}`,marginBottom:12,overflow:'hidden',boxShadow:inSlip(s.id)?'0 0 15px rgba(0,230,118,0.1)':'none'}}>
                <div style={{padding:'12px 14px',background:inSlip(s.id)?'rgba(0,230,118,0.05)':'rgba(245,197,24,0.04)',borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                    <div style={{fontSize:11,color:C.muted,letterSpacing:'1px',textTransform:'uppercase'}}>{s.league} · {s.time}</div>
                    <div style={{background:rBg(s.rating),borderRadius:6,padding:'3px 9px',color:rCol(s.rating),fontWeight:900,fontSize:11,letterSpacing:'1px'}}>
                      {s.rating==='HOT'?'🔥 HOT':s.rating==='GOOD'?'⭐ GOOD':'✅ SOLID'}
                    </div>
                  </div>
                  <div style={{fontWeight:800,fontSize:16,color:C.text}}>{s.homeTeam} <span style={{color:C.muted,fontWeight:400}}>vs</span> {s.awayTeam}</div>
                </div>
                <div style={{padding:'12px 14px'}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:12}}>
                    {[['MERCATO',s.market,C.blue,'rgba(79,172,254,0.1)','rgba(79,172,254,0.25)'],
                      ['SELEZIONE',s.selection,C.green,'rgba(0,230,118,0.1)','rgba(0,230,118,0.25)'],
                      ['QUOTA',s.odds,C.gold,'rgba(245,197,24,0.1)','rgba(245,197,24,0.25)'],
                      ['RISCHIO',s.risk,s.risk==='BASSA'?C.green:s.risk==='MEDIA'?C.gold:C.red,`rgba(${s.risk==='BASSA'?'0,230,118':s.risk==='MEDIA'?'245,197,24':'255,71,87'},0.1)`,`rgba(${s.risk==='BASSA'?'0,230,118':s.risk==='MEDIA'?'245,197,24':'255,71,87'},0.25)`]
                    ].map(([lbl,val,col,bg,bd])=>(
                      <div key={lbl} style={{background:bg,borderRadius:8,padding:'7px 6px',border:`1px solid ${bd}`,textAlign:'center'}}>
                        <div style={{fontSize:9,color:C.muted,marginBottom:3}}>{lbl}</div>
                        <div style={{fontWeight:800,fontSize:11,color:col,lineHeight:1.2}}>{val}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                      <span style={{fontSize:11,color:C.muted}}>Confidenza AI</span>
                      <span style={{fontSize:12,fontWeight:700,color:confCol(s.confidence)}}>{s.confidence}/10</span>
                    </div>
                    <div style={{height:5,background:C.border,borderRadius:99,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${s.confidence*10}%`,background:`linear-gradient(90deg,${confCol(s.confidence)},${confCol(s.confidence)}99)`,borderRadius:99}}/>
                    </div>
                  </div>
                  <div style={{marginBottom:10}}>
                    {s.keyStats?.map((st,i)=>(
                      <div key={i} style={{display:'flex',gap:7,marginBottom:5,alignItems:'flex-start'}}>
                        <span style={{color:C.gold,fontSize:12,flexShrink:0,marginTop:1}}>▸</span>
                        <span style={{fontSize:12,color:C.dim,lineHeight:1.5}}>{st}</span>
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>setExpandedId(expandedId===s.id?null:s.id)} style={{width:'100%',padding:'7px',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,color:C.dim,fontSize:12,cursor:'pointer',marginBottom:10}}>
                    {expandedId===s.id?'▲ Nascondi analisi':'▼ Leggi analisi completa'}
                  </button>
                  {expandedId===s.id&&(
                    <div style={{padding:'12px 14px',background:'rgba(0,0,0,0.35)',borderRadius:10,fontSize:13,color:'#d8e3f4',lineHeight:1.75,marginBottom:10,border:'1px solid rgba(255,255,255,0.07)'}}>
                      {s.analysis}
                    </div>
                  )}
                  <button onClick={()=>toggleSlip(s)} style={{width:'100%',padding:'11px',background:inSlip(s.id)?'rgba(0,230,118,0.15)':`linear-gradient(135deg,rgba(245,197,24,0.12),rgba(245,197,24,0.08))`,border:`1px solid ${inSlip(s.id)?'rgba(0,230,118,0.5)':'rgba(245,197,24,0.3)'}`,borderRadius:10,color:inSlip(s.id)?C.green:C.gold,fontWeight:700,fontSize:13,cursor:'pointer',letterSpacing:'0.5px'}}>
                    {inSlip(s.id)?'✅ Aggiunto · Rimuovi':'🎫 Aggiungi alla Schedina'}
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* GIOCATE */}
        {tab==='bets'&&(
          <div>
            <div style={{background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
              <div style={{fontSize:11,color:C.gold,letterSpacing:'2px',textTransform:'uppercase',marginBottom:12,fontWeight:700}}>➕ Inserimento Manuale</div>
              {[['match','⚽ Partita','Juventus vs Milan'],['market','📋 Mercato','Over 2.5'],['selection','🎯 Selezione','Over 2.5 Gol'],['odds','📈 Quota','1.75'],['stake','💶 Puntata €','10']].map(([k,l,p])=>(
                <input key={k} placeholder={`${l} — es. ${p}`} value={newBet[k]} onChange={e=>setNewBet({...newBet,[k]:e.target.value})}
                  style={{width:'100%',background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 12px',color:C.text,fontSize:13,marginBottom:8,outline:'none'}}/>
              ))}
              <button onClick={addBet} style={{width:'100%',padding:'12px',background:`linear-gradient(135deg,${C.green},#00a860)`,border:'none',borderRadius:10,color:'#07091a',fontWeight:900,fontSize:14,cursor:'pointer'}}>SALVA GIOCATA</button>
            </div>
            {bets.length===0&&<div style={{textAlign:'center',color:C.muted,padding:40,fontSize:14}}>📭 Nessuna giocata registrata</div>}
            {bets.map(b=>(
              <div key={b.id} style={{background:C.card,borderRadius:14,padding:14,border:`1px solid ${b.result==='won'?'rgba(0,230,118,0.35)':b.result==='lost'?'rgba(255,71,87,0.35)':C.border}`,marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div style={{flex:1,marginRight:8}}>
                    <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:3}}>{b.match}</div>
                    <div style={{fontSize:11,color:C.muted}}>{b.market} · {b.date}</div>
                    {b.isMulti&&<div style={{fontSize:11,color:C.dim,marginTop:4,lineHeight:1.5}}>{b.selection}</div>}
                  </div>
                  <button onClick={()=>delBet(b.id)} style={{background:'rgba(255,71,87,0.1)',border:'none',borderRadius:6,padding:'4px 8px',color:C.red,cursor:'pointer',fontSize:11,flexShrink:0}}>✕</button>
                </div>
                <div style={{display:'flex',gap:12,marginBottom:10,flexWrap:'wrap'}}>
                  <span style={{fontSize:13,color:C.gold,fontWeight:700}}>@{b.odds}</span>
                  <span style={{fontSize:13,color:C.muted}}>Puntata: <b style={{color:C.text}}>€{b.stake}</b></span>
                  <span style={{fontSize:13,color:C.green,fontWeight:700}}>→ €{b.potentialWin}</span>
                </div>
                <div style={{display:'flex',gap:6}}>
                  {['pending','won','lost'].map(r=>(
                    <button key={r} onClick={()=>setResult(b.id,r)} style={{flex:1,padding:'7px',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:11,background:b.result===r?(r==='won'?C.green:r==='lost'?C.red:'#2a3a5c'):'rgba(255,255,255,0.04)',color:b.result===r?(r==='pending'?C.text:'#07091a'):C.muted}}>
                      {r==='pending'?'⏳ In corso':r==='won'?'✅ Vinta':'❌ Persa'}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* STATISTICHE */}
        {tab==='stats'&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
              {[['🏆','Vinte',won.length,C.green],['❌','Perse',lost.length,C.red],['⏳','In corso',bets.filter(b=>b.result==='pending').length,C.blue],['🎯','Win Rate',`${winRate}%`,parseFloat(winRate)>=50?C.green:C.red]].map(([icon,lbl,val,col])=>(
                <div key={lbl} style={{background:C.card,borderRadius:14,padding:'14px',border:`1px solid ${C.border}`,textAlign:'center'}}>
                  <div style={{fontSize:22}}>{icon}</div>
                  <div style={{fontSize:24,fontWeight:900,color:col}}>{val}</div>
                  <div style={{fontSize:11,color:C.muted,letterSpacing:'1px'}}>{lbl}</div>
                </div>
              ))}
            </div>
            <div style={{background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`,marginBottom:14}}>
              <div style={{fontSize:11,color:C.gold,letterSpacing:'2px',textTransform:'uppercase',marginBottom:12,fontWeight:700}}>💶 Riepilogo Finanziario</div>
              {[['Totale puntato',`€${fmt(totalStaked)}`,C.text],['Totale ritorni',`€${fmt(totalReturn)}`,C.green],['Profitto netto',`${netProfit>=0?'+':''}€${fmt(netProfit)}`,netProfit>=0?C.green:C.red],['ROI',`${roi}%`,parseFloat(roi)>=0?C.green:C.red]].map(([l,v,col])=>(
                <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:`1px solid ${C.border}`}}>
                  <span style={{color:C.dim,fontSize:13}}>{l}</span>
                  <span style={{fontWeight:800,fontSize:14,color:col}}>{v}</span>
                </div>
              ))}
            </div>
            {(won.length+lost.length)>0&&(
              <div style={{background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,color:C.gold,letterSpacing:'2px',textTransform:'uppercase',marginBottom:12,fontWeight:700}}>📊 Storico</div>
                <div style={{marginBottom:14}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                    <span style={{fontSize:12,color:C.green}}>✅ Vinte: {won.length}</span>
                    <span style={{fontSize:12,color:C.red}}>❌ Perse: {lost.length}</span>
                  </div>
                  <div style={{height:12,background:C.border,borderRadius:99,overflow:'hidden',display:'flex'}}>
                    <div style={{height:'100%',width:`${winRate}%`,background:`linear-gradient(90deg,${C.green},#00a860)`,borderRadius:'99px 0 0 99px'}}/>
                    <div style={{height:'100%',flex:1,background:`${C.red}66`}}/>
                  </div>
                </div>
                {bets.map(b=>(
                  <div key={b.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                    <div style={{width:9,height:9,borderRadius:'50%',flexShrink:0,background:b.result==='won'?C.green:b.result==='lost'?C.red:C.muted}}/>
                    <div style={{flex:1,fontSize:12,color:C.dim,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b.match}</div>
                    <div style={{fontSize:12,fontWeight:700,flexShrink:0,color:b.result==='won'?C.green:b.result==='lost'?C.red:C.muted}}>
                      {b.result==='won'?`+€${fmt(parseFloat(b.potentialWin)-parseFloat(b.stake))}`:b.result==='lost'?`-€${b.stake}`:'–'}
                    </div>
                  </div>
                ))}
              </div>
            )}
            {bets.length===0&&<div style={{textAlign:'center',color:C.muted,padding:40,fontSize:14}}>📭 Inizia a registrare le giocate!</div>}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
